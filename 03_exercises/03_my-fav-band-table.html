<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Favorite Band Table</title>
    <style>
      .band-table {
        display: grid; /*ใช้เพื่อ...*/
        place-items: center;
      }
    </style>
  </head>
  <body>
    <div id="tc-table" class="band-table">
      <table border="1" style="text-align: center">
        <thead>
          <tr>
            <th>ชื่อเล่น</th>
            <th>ชื่อจริง</th>
            <th>ตำแหน่ง</th>
            <th>วันเกิด</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>ดิม</td>
            <td>หรินทร์</td>
            <td>ร้องนำ</td>
            <td>19 ตุลาคม 2528</td>
          </tr>
          <tr>
            <td rowspan="2">รัฐ</td>
            <td rowspan="2">รัฐ</td>
            <td>กีตาร์</td>
            <td rowspan="2">&nbsp;4 กรกฎาคม 2527&nbsp;</td>
          </tr>
          <tr>
            <td>ร้องนำ</td>
          </tr>
          <tr>
            <td>จั๊มพ์</td>
            <td>ธนบดี</td>
            <td>เบส</td>
            <td>30 ธันวาคม 2528</td>
          </tr>
          <tr>
            <td>ตง</td>
            <td>เอกชัย</td>
            <td>กลอง</td>
            <td>1 เมษายน 2528</td>
          </tr>
        </tbody>
        <tfoot>
          <tr>
            <td colspan="4">คนที่มีอายุมากที่สุดในวงได้แก่ คุณรัฐ</td>
          </tr>
        </tfoot>
      </table>
    </div>
  </body>
</html>
